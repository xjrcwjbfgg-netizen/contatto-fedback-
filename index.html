function initFirebase() {
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    onValue(ref(db, "feedback/serate"), snap => {
      const val = snap.val();
      feedbackSerate = val ? Object.values(val).sort((a,b) => b.createdAt - a.createdAt) : [];
      if (mode === "admin") render();
    });
    onValue(ref(db, "feedback/messaggi"), snap => {
      const val = snap.val();
      messaggi = val ? Object.values(val).sort((a,b) => b.createdAt - a.createdAt) : [];
      if (mode === "admin") render();
    });
  } catch(e) { console.warn("Firebase error:", e.message); }
}

async function saveSerata() {
  if (!db || !rating) return false;
  try {
    await push(ref(db, "feedback/serate"), {
      rating, come: come.trim(), suggerimento: suggerimento.trim(),
      createdAt: Date.now()
    });
    return true;
  } catch(e) { return false; }
}

async function saveMessaggio() {
  if (!db || !testo.trim()) return false;
  try {
    await push(ref(db, "feedback/messaggi"), {
      testo: testo.trim(), createdAt: Date.now()
    });
    return true;
  } catch(e) { return false; }
}

function formatDate(ts) {
  return new Date(ts).toLocaleDateString("it-IT", {
    day:"2-digit", month:"long", year:"numeric",
    hour:"2-digit", minute:"2-digit"
  });
}
