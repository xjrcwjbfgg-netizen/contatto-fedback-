<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ConTatto Gruppo+ — Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #FEFCFA; min-height: 100vh; }
  button { font-family: 'DM Sans', system-ui, sans-serif; cursor: pointer; }
  textarea { font-family: 'DM Sans', system-ui, sans-serif; }
  input { font-family: 'DM Sans', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.5s ease; }
  #app { min-height: 100vh; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5WdABp6tv-_fVNVYUlhwsJgnWW41YxbM",
  authDomain: "contatto-1a40d.firebaseapp.com",
  databaseURL: "https://contatto-1a40d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "contatto-1a40d",
  storageBucket: "contatto-1a40d.firebasestorage.app",
  messagingSenderId: "945781571409",
  appId: "1:945781571409:web:cd206f49a015abf99d9d70"
};

const TEAL = "#2BA8A0";
const PEACH = "#E8A882";
const CORAL = "#C85A3A";
const ADMIN_PW = "contatto2025";

const EMOJIS = [
  { icon: "😞", label: "Difficile", value: 1 },
  { icon: "😐", label: "Così così", value: 2 },
  { icon: "🙂", label: "Bene", value: 3 },
  { icon: "😊", label: "Molto bene", value: 4 },
  { icon: "🤩", label: "Straordinaria", value: 5 },
];

let db = null;
let mode = "welcome";
let logoTaps = 0;
let pw = "";
let pwErr = false;
let rating = null;
let come = "";
let suggerimento = "";
let testo = "";
let sent = false;
let sending = false;
let adminTab = "serate";
let feedbackSerate = [];
let messaggi = [];

function initFirebase() {
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    onValue(ref(db, "feedback/serate"), snap => {
      const val = snap.val();
      feedbackSerate = val ? Object.values(val).sort((a,b) => b.createdAt - a.createdAt) : [];
      if (mode === "admin") render();
    });
    onValue(ref(db, "feedback/messaggi"), snap => {
      const val = snap.val();
      messaggi = val ? Object.values(val).sort((a,b) => b.createdAt - a.createdAt) : [];
      if (mode === "admin") render();
    });
  } catch(e) { console.warn("Firebase error:", e.message); }
}

async function saveSerata() {
  if (!db || !rating) return false;
  try {
    await push(ref(db, "feedback/serate"), {
      rating, come: come.trim(), suggerimento: suggerimento.trim(),
      createdAt: Date.now()
    });
    return true;
  } catch(e) { return false; }
}

async function saveMessaggio() {
  if (!db || !testo.trim()) return false;
  try {
    await push(ref(db, "feedback/messaggi"), {
      testo: testo.trim(), createdAt: Date.now()
    });
    return true;
  } catch(e) { return false; }
}

function formatDate(ts) {
  return new Date(ts).toLocaleDateString("it-IT", {
    day:"2-digit", month:"long", year:"numeric",
    hour:"2-digit", minute:"2-digit"
  });
}

function logo(large) {
  const serif = large ? 42 : 22;
  const sans = large ? 18 : 11;
  const gap = large ? 10 : 5;
  return `<span style="display:inline-flex;align-items:baseline;gap:${gap}px;">
    <span style="font-family:'DM Serif Display',Georgia,serif;font-style:italic;font-size:${serif}px;color:${TEAL};font-weight:400;">Con</span><span style="font-family:'DM Serif Display',Georgia,serif;font-style:italic;font-size:${serif}px;color:${PEACH};font-weight:400;">tatto</span>
    <span style="font-family:'DM Sans',system-ui,sans-serif;font-size:${sans}px;font-weight:800;letter-spacing:0.08em;color:${TEAL};margin-left:${large?4:2}px;">GRUPPO</span><span style="font-family:'DM Sans',system-ui,sans-serif;font-size:${sans}px;font-weight:800;color:${PEACH};">+</span>
  </span>`;
}

function render() {
  const app = document.getElementById("app");
  if (mode === "welcome") app.innerHTML = renderWelcome();
  else if (mode === "serata") app.innerHTML = renderSerata();
  else if (mode === "scrivimi") app.innerHTML = renderScrivimi();
  else if (mode === "adminauth") app.innerHTML = renderAdminAuth();
  else if (mode === "admin") app.innerHTML = renderAdmin();
  attachEvents();
}

function renderWelcome() {
  return `
  <div style="min-height:100vh;background:#FEFCFA;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;position:relative;overflow:hidden;">
    <div style="position:absolute;top:-120px;right:-100px;width:400px;height:400px;border-radius:50%;background:${TEAL}0d;pointer-events:none;"></div>
    <div style="position:absolute;bottom:-100px;left:-80px;width:300px;height:300px;border-radius:50%;background:${PEACH}18;pointer-events:none;"></div>
    <div style="max-width:440px;width:100%;text-align:center;position:relative;">
      <div style="display:flex;justify-content:center;margin-bottom:40px;cursor:pointer;" id="logo-tap">${logo(true)}</div>
      <p style="color:#888;font-size:17px;line-height:1.8;margin:0 0 48px;">Uno spazio anonimo per lasciarci<br>un pensiero sulla serata, o scrivermi qualcosa.</p>
      <button id="btn-serata" style="display:block;width:100%;background:${TEAL};color:white;border:none;border-radius:18px;padding:20px 32px;font-size:17px;font-weight:700;margin-bottom:14px;box-shadow:0 4px 20px ${TEAL}44;">
        🌙 Feedback serata
      </button>
      <button id="btn-scrivimi" style="display:block;width:100%;background:white;color:${CORAL};border:2px solid ${CORAL}44;border-radius:18px;padding:20px 32px;font-size:17px;font-weight:700;margin-bottom:14px;">
        ✉️ Scrivimi
      </button>
      <p style="margin-top:24px;color:#ccc;font-size:13px;">Nessun dato personale viene raccolto.</p>
    </div>
  </div>`;
}

function renderSerata() {
  if (sent) {
    return `
    <div style="min-height:100vh;background:#FEFCFA;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;">
      <div style="max-width:440px;width:100%;text-align:center;" class="fade-up">
        <div style="font-size:52px;margin-bottom:20px;">✨</div>
        <h2 style="font-family:'DM Serif Display',Georgia,serif;font-size:32px;font-weight:400;color:#111;font-style:italic;margin-bottom:12px;">Grazie</h2>
        <p style="color:#888;font-size:16px;line-height:1.7;margin-bottom:36px;">Il tuo feedback è arrivato.<br>Ogni voce conta, davvero.</p>
        <button id="btn-home" style="background:none;border:none;color:${TEAL};font-size:15px;font-weight:600;">← Torna alla home</button>
      </div>
    </div>`;
  }
  const canSubmit = rating !== null;
  return `
  <div style="min-height:100vh;background:#FEFCFA;max-width:500px;margin:0 auto;">
    <div style="height:5px;background:${TEAL};width:100%;box-shadow:0 2px 12px ${TEAL}55;"></div>
    <div style="padding:28px 24px 60px;" class="fade-up">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;">
        ${logo(false)}
        <button id="btn-home" style="background:none;border:none;color:#bbb;font-size:14px;">← Indietro</button>
      </div>
      <div style="width:44px;height:5px;background:${TEAL};border-radius:4px;margin-bottom:22px;"></div>
      <h2 style="font-family:'DM Serif Display',Georgia,serif;font-size:32px;font-weight:400;color:#111;font-style:italic;margin-bottom:6px;">Feedback serata</h2>
      <p style="color:#aaa;font-size:14px;margin-bottom:32px;">Anonimo, sincero, libero.</p>
      <div style="margin-bottom:28px;">
        <p style="color:#aaa;font-size:11px;letter-spacing:3px;font-weight:700;margin-bottom:16px;">COM'È STATA LA SERATA?</p>
        <div style="display:flex;gap:8px;">
          ${EMOJIS.map(e => `
            <button data-vote="${e.value}" style="flex:1;padding:14px 4px 10px;border-radius:14px;border:${rating===e.value?`2.5px solid ${TEAL}`:'2px solid #e8ddd4'};background:${rating===e.value?TEAL+'18':'white'};display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.15s;">
              <span style="font-size:22px;">${e.icon}</span>
              <span style="font-size:9px;font-weight:700;color:${rating===e.value?TEAL:'#ccc'};">${e.value}</span>
            </button>`).join('')}
        </div>
        ${rating ? `<p style="text-align:center;color:${TEAL};font-size:13px;font-weight:600;margin-top:10px;">${EMOJIS.find(e=>e.value===rating)?.label}</p>` : ''}
      </div>
      <div style="margin-bottom:24px;">
        <p style="color:#aaa;font-size:11px;letter-spacing:3px;font-weight:700;margin-bottom:12px;">COM'È ANDATA STASERA?</p>
        <textarea id="ta-come" rows="4" placeholder="Racconta come ti è sembrata la serata..."
          style="width:100%;border-radius:14px;border:2px solid #e8ddd4;padding:16px 18px;font-size:16px;resize:none;outline:none;background:white;line-height:1.65;color:#333;">${come}</textarea>
      </div>
      <div style="margin-bottom:32px;">
        <p style="color:#aaa;font-size:11px;letter-spacing:3px;font-weight:700;margin-bottom:12px;">COSA SUGGERIRESTI?</p>
        <textarea id="ta-sug" rows="3" placeholder="Un argomento per le prossime serate, un'idea, qualcosa da cambiare..."
          style="width:100%;border-radius:14px;border:2px solid #e8ddd4;padding:16px 18px;font-size:16px;resize:none;outline:none;background:white;line-height:1.65;color:#333;">${suggerimento}</textarea>
      </div>
      <button id="btn-submit" style="width:100%;background:${canSubmit?CORAL:'#e8ddd4'};color:${canSubmit?'white':'#ccc'};border:none;border-radius:16px;padding:19px;font-size:17px;font-weight:700;">
        ${sending ? "Invio in corso..." : "Invia in modo anonimo >>>"}
      </button>
      ${!rating ? `<p style="text-align:center;color:#ccc;font-size:13px;margin-top:12px;">Seleziona almeno una valutazione per continuare</p>` : ''}
    </div>
  </div>`;
}

function renderScrivimi() {
  if (sent) {
    return `
    <div style="min-height:100vh;background:#FEFCFA;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;">
      <div style="max-width:440px;width:100%;text-align:center;" class="fade-up">
        <div style="font-size:52px;margin-bottom:20px;">✨</div>
        <h2 style="font-family:'DM Serif Display',Georgia,serif;font-size:32px;font-weight:400;color:#111;font-style:italic;margin-bottom:12px;">Grazie</h2>
        <p style="color:#888;font-size:16px;line-height:1.7;margin-bottom:36px;">Il tuo messaggio è arrivato.<br>Solo io lo leggerò.</p>
        <button id="btn-home" style="background:none;border:none;color:${TEAL};font-size:15px;font-weight:600;">← Torna alla home</button>
      </div>
    </div>`;
  }
  return `
  <div style="min-height:100vh;background:#FEFCFA;max-width:500px;margin:0 auto;">
    <div style="height:5px;background:${PEACH};width:100%;box-shadow:0 2px 12px ${PEACH}55;"></div>
    <div style="padding:28px 24px 60px;" class="fade-up">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;">
        ${logo(false)}
        <button id="btn-home" style="background:none;border:none;color:#bbb;font-size:14px;">← Indietro</button>
      </div>
      <div style="width:44px;height:5px;background:${PEACH};border-radius:4px;margin-bottom:22px;"></div>
      <h2 style="font-family:'DM Serif Display',Georgia,serif;font-size:32px;font-weight:400;color:#111;font-style:italic;margin-bottom:28px;">Scrivimi</h2>
      <div style="background:${TEAL}0d;border:1.5px solid ${TEAL}28;border-radius:16px;padding:18px 20px;margin-bottom:28px;">
        <p style="color:#555;font-size:16px;line-height:1.85;margin:0;">C'è qualcosa che vuoi farmi arrivare — su di te, sulla serata, su come ti sei sentitə, su qualcosa che non hai detto. Questo spazio è anonimo e solo per me.</p>
      </div>
      <textarea id="ta-testo" rows="8" placeholder="Scrivi qui..."
        style="width:100%;border-radius:14px;border:2px solid #e8ddd4;padding:16px 18px;font-size:16px;resize:none;outline:none;background:white;line-height:1.65;color:#333;margin-bottom:28px;">${testo}</textarea>
      <button id="btn-submit" style="width:100%;background:${testo.trim()?CORAL:'#e8ddd4'};color:${testo.trim()?'white':'#ccc'};border:none;border-radius:16px;padding:19px;font-size:17px;font-weight:700;">
        ${sending ? "Invio in corso..." : "Invia in modo anonimo >>>"}
      </button>
      <p style="text-align:center;color:#ccc;font-size:13px;margin-top:16px;line-height:1.7;">Completamente anonimo.<br>Nessun dato personale viene raccolto.</p>
    </div>
  </div>`;
}

function renderAdminAuth() {
  return `
  <div style="min-height:100vh;background:#FEFCFA;display:flex;align-items:center;justify-content:center;padding:32px;">
    <div style="max-width:360px;width:100%;text-align:center;">
      <div style="display:flex;justify-content:center;margin-bottom:32px;">${logo(false)}</div>
      <div style="color:${TEAL};font-size:11px;letter-spacing:5px;font-weight:800;margin-bottom:28px;">ACCESSO ADMIN</div>
      <input id="pw-input" type="password" placeholder="Password" value="${pw}"
        style="width:100%;padding:16px 20px;border-radius:14px;font-size:17px;outline:none;margin-bottom:10px;border:2px solid ${pwErr?CORAL:'#e8ddd4'};background:white;color:#333;" />
      ${pwErr ? `<p style="color:${CORAL};font-size:14px;margin:0 0 12px;font-weight:600;">Password non corretta</p>` : ''}
      <button id="btn-login" style="width:100%;background:${TEAL};color:white;border:none;border-radius:14px;padding:18px;font-size:16px;font-weight:700;margin-bottom:14px;">Entra</button>
      <button id="btn-back" style="background:none;border:none;color:#bbb;font-size:14px;">Indietro</button>
    </div>
  </div>`;
}

function renderAdmin() {
  const data = adminTab === "serate" ? feedbackSerate : messaggi;
  const tabBtn = (id, label, count) => `
    <button data-tab="${id}" style="flex:1;padding:12px;border-radius:12px;border:${adminTab===id?`2px solid ${TEAL}`:'2px solid #e8ddd4'};background:${adminTab===id?TEAL+'14':'white'};color:${adminTab===id?TEAL:'#888'};font-size:13px;font-weight:700;">
      ${label} <span style="background:${adminTab===id?TEAL:'#e8ddd4'};color:${adminTab===id?'white':'#aaa'};border-radius:20px;padding:2px 8px;font-size:11px;margin-left:4px;">${count}</span>
    </button>`;
  const cardSerata = f => `
    <div style="background:white;border:1.5px solid #e8ddd4;border-radius:16px;padding:20px 22px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:24px;">${EMOJIS.find(e=>e.value===f.rating)?.icon||'—'}</span>
        <span style="color:#aaa;font-size:11px;">${formatDate(f.createdAt)}</span>
      </div>
      ${f.come ? `<div style="margin-bottom:10px;"><p style="font-size:10px;letter-spacing:2px;color:#ccc;font-weight:700;margin-bottom:5px;">COM'È ANDATA</p><p style="color:#333;font-size:14px;line-height:1.65;">${f.come}</p></div>` : ''}
      ${f.suggerimento ? `<div><p style="font-size:10px;letter-spacing:2px;color:#ccc;font-weight:700;margin-bottom:5px;">SUGGERIMENTO</p><p style="color:#333;font-size:14px;line-height:1.65;">${f.suggerimento}</p></div>` : ''}
    </div>`;
  const cardMessaggio = m => `
    <div style="background:white;border:1.5px solid #e8ddd4;border-left:4px solid ${PEACH};border-radius:16px;padding:20px 22px;margin-bottom:12px;">
      <p style="color:#aaa;font-size:11px;margin-bottom:10px;">${formatDate(m.createdAt)}</p>
      <p style="color:#333;font-size:15px;line-height:1.75;">${m.testo}</p>
    </div>`;
  return `
  <div style="min-height:100vh;background:#FEFCFA;max-width:560px;margin:0 auto;padding:28px 20px 60px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;">
      ${logo(false)}
      <button id="btn-logout" style="background:none;border:none;color:#bbb;font-size:13px;font-weight:600;">Esci</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:24px;">
      ${tabBtn("serate","🌙 Serate", feedbackSerate.length)}
      ${tabBtn("messaggi","✉️ Messaggi", messaggi.length)}
    </div>
    <div>
      ${data.length === 0
        ? `<div style="text-align:center;padding:48px 0;color:#ccc;font-size:15px;">Nessun contenuto ancora</div>`
        : data.map(adminTab === "serate" ? cardSerata : cardMessaggio).join('')}
    </div>
  </div>`;
}

function attachEvents() {
  const $ = id => document.getElementById(id);
  if (mode === "welcome") {
    $("btn-serata")?.addEventListener("click", () => { rating=null; come=""; suggerimento=""; sent=false; sending=false; mode="serata"; render(); });
    $("btn-scrivimi")?.addEventListener("click", () => { testo=""; sent=false; sending=false; mode="scrivimi"; render(); });
    $("logo-tap")?.addEventListener("click", () => { logoTaps++; if (logoTaps >= 5) { logoTaps=0; mode="adminauth"; render(); } });
  }
  if (mode === "serata") {
    $("btn-home")?.addEventListener("click", () => { mode="welcome"; render(); });
    document.querySelectorAll("[data-vote]").forEach(btn => { btn.addEventListener("click", () => { rating=parseInt(btn.dataset.vote); render(); }); });
    $("ta-come")?.addEventListener("input", e => { come=e.target.value; });
    $("ta-sug")?.addEventListener("input", e => { suggerimento=e.target.value; });
    $("btn-submit")?.addEventListener("click", async () => { if (!rating || sending) return; sending=true; render(); const ok = await saveSerata(); sending=false; if (ok) { sent=true; render(); } });
  }
  if (mode === "scrivimi") {
    $("btn-home")?.addEventListener("click", () => { mode="welcome"; render(); });
    $("ta-testo")?.addEventListener("input", e => { testo=e.target.value; render(); });
    $("btn-submit")?.addEventListener("click", async () => { if (!testo.trim() || sending) return; sending=true; render(); const ok = await saveMessaggio(); sending=false; if (ok) { sent=true; render(); } });
  }
  if (mode === "adminauth") {
    const input = $("pw-input");
    input?.addEventListener("input", e => { pw=e.target.value; pwErr=false; });
    input?.addEventListener("keydown", e => { if(e.key==="Enter") tryLogin(); });
    $("btn-login")?.addEventListener("click", tryLogin);
    $("btn-back")?.addEventListener("click", () => { mode="welcome"; render(); });
  }
  if (mode === "admin") {
    $("btn-logout")?.addEventListener("click", () => { mode="welcome"; render(); });
    document.querySelectorAll("[data-tab]").forEach(btn => { btn.addEventListener("click", () => { adminTab=btn.dataset.tab; render(); }); });
  }
  if (mode === "serata" && sent) { $("btn-home")?.addEventListener("click", () => { mode="welcome"; render(); }); }
  if (mode === "scrivimi" && sent) { $("btn-home")?.addEventListener("click", () => { mode="welcome"; render(); }); }
}

function tryLogin() {
  if (pw === ADMIN_PW) { mode="admin"; pwErr=false; render(); }
  else { pwErr=true; render(); }
}

initFirebase();
render();
</script>
</body>
</html>
